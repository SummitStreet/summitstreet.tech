<svg width="100%" viewBox="0 0 680 370" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Horizon line gradient: Cool Azure from left to 60%, then transitions to Deep Slate Blue -->
    <linearGradient id="horizLineGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4f7fa" stop-opacity="1"/>
      <stop offset="60%" stop-color="#f4f7fa" stop-opacity="1"/>
      <stop offset="100%" stop-color="#23435b" stop-opacity="0.35"/>
    </linearGradient>
    <linearGradient id="bottomFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f7fa" stop-opacity="0"/>
      <stop offset="100%" stop-color="#f4f7fa" stop-opacity="0.55"/>
    </linearGradient>
    <linearGradient id="leftFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#f4f7fa" stop-opacity="0.7"/>
      <stop offset="40%" stop-color="#f4f7fa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="horizFade" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f7fa" stop-opacity="1"/>
      <stop offset="50%" stop-color="#f4f7fa" stop-opacity="0.5"/>
